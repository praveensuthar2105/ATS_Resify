version: '3.8'

services:
  identity-service:
    build:
      context: ./Backend/identity-service
      dockerfile: Dockerfile
    container_name: resify-identity-service
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - DB_URL=${DB_URL}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    networks:
      - resify-net
    restart: always

  resume-service:
    build:
      context: ./Backend/resume-service
      dockerfile: Dockerfile
    container_name: resify-resume-service
    ports:
      - "8082:8082"
    environment:
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - DB_URL=${DB_URL}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
    networks:
      - resify-net
    depends_on:
      - rabbitmq
    restart: always

  intelligence-service:
    build:
      context: ./Backend/intelligence-service
      dockerfile: Dockerfile
    container_name: resify-intelligence-service
    ports:
      - "8083:8083"
    environment:
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - DB_URL=${DB_URL}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
    networks:
      - resify-net
    depends_on:
      - rabbitmq
    restart: always

  gateway-service:
    build:
      context: ./Backend/gateway-service
      dockerfile: Dockerfile
    container_name: resify-gateway-service
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - IDENTITY_SERVICE_URL=http://identity-service:8081
      - RESUME_SERVICE_URL=http://resume-service:8082
      - INTELLIGENCE_SERVICE_URL=http://intelligence-service:8083
    depends_on:
      - identity-service
      - resume-service
      - intelligence-service
      - rabbitmq
    networks:
      - resify-net
    restart: always

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: resify-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - resify-net
    restart: always

networks:
  resify-net:
    driver: bridge
