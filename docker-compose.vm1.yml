version: '3.8'

services:
  intelligence-service:
    build:
      context: ./Backend/intelligence-service
      dockerfile: Dockerfile
    container_name: resify-intelligence-service
    ports:
      - "8083:8083"
    environment:
      - EUREKA_URI=${EUREKA_URI}
      - DB_URL=${INTELLIGENCE_DB_URL}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SPRING_RABBITMQ_HOST=${RABBITMQ_HOST}
      - SPRING_RABBITMQ_PORT=${RABBITMQ_PORT:-5671}
      - SPRING_RABBITMQ_USERNAME=${RABBITMQ_USER}
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_PASS}
      - SPRING_RABBITMQ_VIRTUAL_HOST=${RABBITMQ_VHOST:-mgrwepde}
      - SPRING_RABBITMQ_SSL_ENABLED=${RABBITMQ_SSL_ENABLED:-true}
      - RABBITMQ_HOST=${RABBITMQ_HOST}
      - RABBITMQ_PORT=${RABBITMQ_PORT:-5671}
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASS=${RABBITMQ_PASS}
      - RABBITMQ_VIRTUAL_HOST=${RABBITMQ_VHOST:-mgrwepde}
      - JVM_OPTS=-XX:ActiveProcessorCount=1 -XX:MaxRAMPercentage=60.0 -XX:+UseSerialGC -Xss256k -XX:MaxMetaspaceSize=64m
    deploy:
      resources:
        limits:
          memory: 500M
    restart: always