name: Automated CD to Oracle Cloud VMs

on:
  push:
    branches:
      - main
    paths:
      - 'Backend/**'
      - 'docker-compose.vm1.yml'
      - 'docker-compose.vm2.yml'
  workflow_dispatch:

jobs:
  deploy-vm1-gateway:
    name: Deploy VM 1 (Discovery & API Gateway)
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy on VM 1
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM1_HOST }}
          username: ${{ secrets.VM1_USER }}
          key: ${{ secrets.VM1_SSH_KEY }}
          script: |
            echo "--- [VM 1] Pulling latest code from main ---"
            cd AI_Powered_Resume_Builder
            git pull origin main
            echo "--- [VM 1] Rebuilding and starting Discovery Server & API Gateway ---"
            docker compose -f docker-compose.vm1.yml up -d --build --remove-orphans
            echo "--- [VM 1] Deployment complete ---"

  deploy-vm2-microservices:
    name: Deploy VM 2 (RabbitMQ & Business Microservices)
    runs-on: ubuntu-latest
    needs: deploy-vm1-gateway
    steps:
      - name: SSH and Deploy on VM 2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM2_HOST }}
          username: ${{ secrets.VM2_USER }}
          key: ${{ secrets.VM2_SSH_KEY }}
          script: |
            echo "--- [VM 2] Pulling latest code from main ---"
            cd AI_Powered_Resume_Builder
            git pull origin main
            echo "--- [VM 2] Rebuilding and starting Business Microservices & RabbitMQ ---"
            docker compose -f docker-compose.vm2.yml up -d --build --remove-orphans
            echo "--- [VM 2] Deployment complete ---"
