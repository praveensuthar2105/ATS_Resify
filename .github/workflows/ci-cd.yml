name: CI/CD Pipeline to VMs

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test Java Backend
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./Backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build without Tests
        run: ./mvnw clean package -DskipTests

  deploy-vm1:
    name: Deploy to VM1
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    
    steps:
      - name: Execute deployment commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM1_HOST }}
          username: ${{ secrets.VM1_USER }}
          key: ${{ secrets.VM1_SSH_KEY }}
          script: |
            echo "Connected to VM1!"
            # Clone repository if it doesn't exist
            if [ ! -d "ATS_Resify" ]; then
              git clone https://github.com/praveensuthar2105/ATS_Resify.git
            fi
            cd ATS_Resify
            
            # Pull latest changes
            git pull origin main
            
            # Force remove old conflicting containers from previous paths
            docker rm -f resify-intelligence-service || true
            
            # Restart backend using Docker Compose for VM1 (try modern docker compose plugin first)
            if command -v docker-compose &> /dev/null; then
              docker-compose -f docker-compose.vm1.yml down
              docker-compose -f docker-compose.vm1.yml up -d --build
            else
              docker compose -f docker-compose.vm1.yml down
              docker compose -f docker-compose.vm1.yml up -d --build
            fi

  deploy-vm2:
    name: Deploy to VM2
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    
    steps:
      - name: Execute deployment commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM2_HOST }}
          username: ${{ secrets.VM2_USER }}
          key: ${{ secrets.VM2_SSH_KEY }}
          script: |
            echo "Connected to VM2!"
            # Clone repository if it doesn't exist
            if [ ! -d "ATS_Resify" ]; then
              git clone https://github.com/praveensuthar2105/ATS_Resify.git
            fi
            cd ATS_Resify
            
            # Pull latest changes
            git pull origin main
            
            # Force remove old conflicting containers from previous paths
            docker rm -f resify-discovery-server resify-gateway-service resify-identity-service || true
            
            # Restart backend using Docker Compose for VM2 (try modern docker compose plugin first)
            if command -v docker-compose &> /dev/null; then
              docker-compose -f docker-compose.vm2.yml down
              docker-compose -f docker-compose.vm2.yml up -d --build
            else
              docker compose -f docker-compose.vm2.yml down
              docker compose -f docker-compose.vm2.yml up -d --build
            fi
