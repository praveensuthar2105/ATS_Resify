# WARNING: Deprecated in favor of generic free container deployment.
# Hugging Face deployment is disabled to prevent unwanted builds.

name: Deploy to Hugging Face Spaces

on:
  workflow_dispatch:


jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_USERNAME" ] || [ -z "$HF_SPACE_NAME" ]; then
            echo "Error: HF_TOKEN, HF_USERNAME, or HF_SPACE_NAME secrets are missing in GitHub!"
            exit 1
          fi
          
          # Set git config for the temporary subtree branch creation
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          echo "Splitting Backend directory into a deployable branch..."
          git subtree split --prefix=Backend -b huggingface-deploy
          
          echo "Syncing Backend to Hugging Face Space..."
          git push --force https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME huggingface-deploy:main
          echo "Sync completed successfully!"

