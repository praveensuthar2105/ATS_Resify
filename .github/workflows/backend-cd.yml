name: Backend CI/CD to AWS Elastic Beanstalk (Docker)

on:
  push:
    branches:
      - main
    paths:
      - 'Backend/**'
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          
      - name: Build with Maven
        working-directory: ./Backend
        run: mvn clean package -DskipTests
      
      - name: Generate Deployment Package
        run: |
          cd Backend
          # We zip the Dockerfile and the generated compiled jar from the target folder
          zip -r deploy.zip Dockerfile target/*.jar
          
      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          region: ${{ secrets.AWS_REGION }}
          application_name: ${{ secrets.EB_APPLICATION_NAME }}
          environment_name: ${{ secrets.EB_ENVIRONMENT_NAME }}
          version_label: "backend-deploy-${{ github.sha }}"
          deployment_package: Backend/deploy.zip
          wait_for_deployment: true
          wait_for_environment_recovery: 600
          use_existing_version_if_available: true
