name: Backend CI/CD to Google Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'Backend/**'
  workflow_dispatch:

env:
  GCP_REGION: asia-south1
  SERVICE_NAME: ats-resify-backend
  DOCKER_REPO: ats-resify-repo

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          
      - name: Build with Maven
        working-directory: ./Backend
        run: mvn clean package -DskipTests

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Docker Image
        working-directory: ./Backend
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.DOCKER_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t $IMAGE .
          docker push $IMAGE

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.DOCKER_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --memory=1Gi
            --cpu=1
            --min-instances=0
            --max-instances=2
            --timeout=300
            --concurrency=80
          env_vars: |
            SPRING_PROFILES_ACTIVE=gcp
          secrets: |
            DB_URL=DB_URL:latest
            DB_USERNAME=DB_USERNAME:latest
            DB_PASSWORD=DB_PASSWORD:latest
            FRONTEND_URL=FRONTEND_URL:latest
            GEMINI_API_KEY=GEMINI_API_KEY:latest
            GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest
            GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest
            JWT_SECRET=JWT_SECRET:latest
            REDIS_HOST=REDIS_HOST:latest
            REDIS_PORT=REDIS_PORT:latest
            REDIS_PASSWORD=REDIS_PASSWORD:latest
            VERTEX_PROJECT_ID=VERTEX_PROJECT_ID:latest
