version: '3.8'

services:
  discovery-server:
    build:
      context: .
      dockerfile: Backend/discovery-server/Dockerfile.prod
    container_name: resify-discovery-server
    ports:
      - "8761:8761"
    environment:
      - JVM_OPTS=-XX:ActiveProcessorCount=1 -XX:MaxRAMPercentage=40.0 -XX:+UseSerialGC -Xss256k -XX:MaxMetaspaceSize=64m
    deploy:
      resources:
        limits:
          memory: 200M
    networks:
      - resify-net
    restart: always

  gateway-service:
    build:
      context: .
      dockerfile: Backend/gateway-service/Dockerfile.prod
    container_name: resify-gateway-service
    ports:
      - "8080:8080" # Run gateway on 8080 so host Nginx can listen on 80/443
    environment:
      - EUREKA_URI=http://discovery-server:8761/eureka/
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JVM_OPTS=-XX:ActiveProcessorCount=1 -XX:MaxRAMPercentage=40.0 -XX:+UseSerialGC -Xss256k -XX:MaxMetaspaceSize=64m
    deploy:
      resources:
        limits:
          memory: 200M
    depends_on:
      - discovery-server
    networks:
      - resify-net
    restart: always

  identity-service:
    build:
      context: .
      dockerfile: Backend/identity-service/Dockerfile.prod
    container_name: resify-identity-service
    ports:
      - "8081:8081"
    environment:
      - EUREKA_URI=http://discovery-server:8761/eureka/
      - DB_URL=${IDENTITY_DB_URL}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
      - JVM_OPTS=-XX:ActiveProcessorCount=1 -XX:MaxRAMPercentage=40.0 -XX:+UseSerialGC -Xss256k -XX:MaxMetaspaceSize=64m
    deploy:
      resources:
        limits:
          memory: 250M
    depends_on:
      - discovery-server
    networks:
      - resify-net
    restart: always

  intelligence-service:
    build:
      context: .
      dockerfile: Backend/intelligence-service/Dockerfile.prod
    container_name: resify-intelligence-service
    ports:
      - "8083:8083"
    environment:
      - EUREKA_URI=http://discovery-server:8761/eureka/
      - DB_URL=${INTELLIGENCE_DB_URL}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - RABBITMQ_HOST=${RABBITMQ_HOST}
      - RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASS=${RABBITMQ_PASS}
      - RABBITMQ_VIRTUAL_HOST=${RABBITMQ_VIRTUAL_HOST}
      - JVM_OPTS=-XX:ActiveProcessorCount=1 -XX:MaxRAMPercentage=40.0 -XX:+UseSerialGC -Xss256k -XX:MaxMetaspaceSize=64m
    deploy:
      resources:
        limits:
          memory: 250M
    depends_on:
      - discovery-server
    networks:
      - resify-net
    restart: always

networks:
  resify-net:
    driver: bridge
