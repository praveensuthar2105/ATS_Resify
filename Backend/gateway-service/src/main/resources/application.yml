server:
  port: 8080
spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webflux:
          routes:
            # Auth Service Routes
            - id: auth-route
              uri: http://localhost:8081
              predicates:
                - Path=/oauth2/**, /login/**, /auth/**, /api/auth/**
                
            # User Service Routes
            - id: user-route
              uri: http://localhost:8082
              predicates:
                - Path=/api/user/**
                
            # Resume Service Routes
            - id: resume-route
              uri: http://localhost:8083
              predicates:
                - Path=/api/resume/generate, /api/latex/**, /ws-sync/**
                
            # ATS Service Routes
            - id: ats-route
              uri: http://localhost:8085
              predicates:
                - Path=/api/resume/ats-score
                
            # Agent Service Routes
            - id: agent-route
              uri: http://localhost:8086
              predicates:
                - Path=/api/agent/**, /api/resume/import/**
                
            # Admin Service Routes
            - id: admin-route
              uri: http://localhost:8087
              predicates:
                - Path=/api/admin/**
                
            # Support Service Routes
            - id: support-route
              uri: http://localhost:8088
              predicates:
                - Path=/api/public/**
