server:
  port: 8080
spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://localhost:5174"
              - "http://localhost:5175"
              - "http://localhost:3000"
              - "https://atsresify.me"
              - "https://www.atsresify.me"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - HEAD
              - PATCH
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        # Identity Service Routes (Auth, User, Admin, Support, Health)
        - id: identity-route
          uri: lb://identity-service
          predicates:
            - Path=/oauth2/**, /login/**, /auth/**, /api/auth/**, /api/user/**, /api/admin/**, /api/public/**, /api/health/**
            
        # Resume Service Routes (Resume Generation, Sync, LaTeX Compile, WebSockets)
        - id: resume-route
          uri: ${RESUME_SERVICE_URI:lb://resume-service}
          predicates:
            - Path=/api/resume/generate, /api/latex/**, /api/resume-sync/**, /ws-resume/**, /ws-sync/**
            
        # Intelligence Service Routes (ATS Score, Agent Chat, Imports)
        - id: intelligence-route
          uri: lb://intelligence-service
          predicates:
            - Path=/api/resume/ats-score, /api/agent/**, /api/resume/import/**

eureka:
  instance:
    preferIpAddress: true
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
