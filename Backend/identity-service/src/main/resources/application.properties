spring.application.name=identity-service
server.port=${PORT:8081}

# ==========================================
# Common Config inherited from monolith
# ==========================================
spring.ai.ollama.chat.model=deepseek-r1:1.5b
#spring.ai.ollama.chat.options.temperature=0.7
spring.ai.ollama.chat.options.system=You are an English-speaking AI assistant. Always respond in English only.

# Handle X-Forwarded-* headers (Critical for AWS ALB / Elastic Beanstalk HTTPS)
server.forward-headers-strategy=framework

# Frontend URL (for OAuth2 redirect) - Default to Production if not overridden
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# ==========================================
# Production admin / security controls
# ==========================================
# One-time break-glass bootstrap when zero ADMIN users exist. Leave empty in steady-state prod.
app.bootstrap-admin-email=${BOOTSTRAP_ADMIN_EMAIL:}
# SQL Studio is OFF by default. Never enable in public prod without a RO DB user.
app.admin.sql-studio.enabled=${ADMIN_SQL_STUDIO_ENABLED:false}
app.admin.sql-studio.max-rows=${ADMIN_SQL_STUDIO_MAX_ROWS:200}
app.admin.export.max-rows=${ADMIN_EXPORT_MAX_ROWS:50000}
# Resume service base URL for admin health probes (use internal service DNS in Docker).
resume.service.url=${RESUME_SERVICE_URL:http://localhost:8082}

# CORS configuration
# Used by SecurityConfig via @Value("${cors.allowed-origins}")
cors.allowed-origins=${CORS_ORIGINS:https://atsresify.me,https://www.atsresify.me,http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:3000}
# Standard Spring Boot property (kept for compatibility)
spring.web.cors.allowed-origins=${cors.allowed-origins}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Gemini API Configuration
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=gemini-2.5-flash

# LangChain4j Configuration
langchain4j.google-gemini.chat-model.api-key=${gemini.api.key}
langchain4j.google-gemini.chat-model.model-name=${gemini.model}

# OAuth2 Google Configuration (from environment variables)
# Get credentials from: https://console.cloud.google.com/apis/credentials
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=profile,email
# Redirect URI explicit for Google whitelist matching
spring.security.oauth2.client.registration.google.redirect-uri=${OAUTH_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}

# JWT Configuration (use strong secret via environment variable)
# Secret must be at least 256 bits (32 characters) for HS256
jwt.secret=${JWT_SECRET}
jwt.expiration=259200000

# MySQL Database Configuration
# Prefer environment variables for credentials in production.
spring.datasource.url=${IDENTITY_DB_URL:jdbc:mysql://localhost:3306/identity_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# LaTeX compiler configuration (server-side PDF generation)
# - latex.compiler: auto | tectonic | pdflatex
#   auto will try tectonic first, then pdflatex.
# - latex.compiler.path: Optional absolute path to the compiler executable if not on PATH.
#   Examples (Windows):
#     latex.compiler=tectonic
#     latex.compiler.path=C:/Program Files/Tectonic/tectonic.exe
#   or for MiKTeX pdflatex:
#     latex.compiler=pdflatex
#     latex.compiler.path=C:/Program Files/MiKTeX/miktex/bin/x64/pdflatex.exe

# Actuator Endpoint Security Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
# - latex.compile.timeoutSeconds: Max seconds to wait before timing out.
latex.compiler=pdflatex
latex.compiler.path=C:/Program Files/MiKTeX/miktex/bin/x64/pdflatex.exe
latex.compile.timeoutSeconds=60

# ============================================================
# Redis Configuration (for AI Agent caching)
# ============================================================
# Redis connection settings (use environment variables in production)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=5000ms

# Lettuce connection pool settings (Lettuce is default Redis client in Spring Boot)
spring.data.redis.lettuce.pool.enabled=true
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=2000ms

# Enable Spring Cache with Redis
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000
spring.cache.redis.cache-null-values=false

# AI Agent cache TTLs (custom properties for RedisConfig)
# These control how long different types of AI responses are cached
cache.ai.bullet-improvement-ttl=86400000
cache.ai.job-matching-ttl=3600000
cache.ai.content-generation-ttl=86400000
cache.ai.agent-session-ttl=1800000


# Trigger Deploy

# Eureka Discovery Client Configuration
eureka.client.service-url.defaultZone=${EUREKA_URI:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

eureka.instance.prefer-ip-address=true
